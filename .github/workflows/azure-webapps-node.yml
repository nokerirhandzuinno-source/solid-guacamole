# 🚀 Azure Web App Deployment Workflow for Node.js
# This workflow builds and deploys a Node.js application to Azure App Service
# whenever a commit is pushed to the specified branch.

# 🛠️ Prerequisites:
# 1. Create your Azure App Service Web App.
#    👉 https://docs.microsoft.com/en-us/azure/app-service/quickstart-nodejs?tabs=linux&pivots=development-environment-cli
#
# 2. Download the Publish Profile from the Azure Portal (Web App > Overview > Get Publish Profile).
#    👉 https://docs.microsoft.com/en-us/azure/app-service/deploy-github-actions?tabs=applevel#generate-deployment-credentials
#
# 3. Add the publish profile as a GitHub secret named: AZURE_WEBAPP_PUBLISH_PROFILE
#    👉 https://docs.microsoft.com/en-us/azure/app-service/deploy-github-actions#configure-the-github-secret
#
# 4. Update AZURE_WEBAPP_NAME with your actual app name.
#    Optionally adjust AZURE_WEBAPP_PACKAGE_PATH and NODE_VERSION.

# 📚 More Resources:
# - GitHub Actions for Azure: https://github.com/Azure/Actions
# - Azure Web Apps Deploy Action: https://github.com/Azure/webapps-deploy
# - Workflow Samples: https://github.com/Azure/actions-workflow-samples

on:
  push:
    branches: [ "codespace-solid-guacamole-r454wgvg77pjf5g7v" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-app-name              # 🔧 Replace with your Azure Web App name
  AZURE_WEBAPP_PACKAGE_PATH: '.'                # 📦 Path to your app (default: repo root)
  NODE_VERSION: '20.x'                          # 🧠 Node.js version

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🏗️ Install dependencies, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 🚀 Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
